name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Номер PR (для ручного запуска)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

      - name: Safety cleanup
        run: rm -rf pr-preview || true

      - name: Deploy PR preview
        id: pr-preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: true
          comment: "true"
          pages-base-url: ${{ format('{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          # При workflow_dispatch нет event.pull_request.number — передаём номер явно и принудительно деплоим
          pr-number: ${{ github.event.pull_request.number || inputs.pr_number }}
          action: ${{ github.event_name == 'workflow_dispatch' && 'deploy' || 'auto' }}

      - name: Create short link (clc.is)
        id: short-link
        if: github.event.action != 'closed' && success() && steps.pr-preview.outputs.deployment-action == 'deploy' && steps.pr-preview.outputs.preview-url != ''
        run: |
          PREVIEW_URL="${{ steps.pr-preview.outputs.preview-url }}"
          PR_NUM="${{ github.event.pull_request.number || inputs.pr_number }}"
          SLUG="copilot-1co-2.0-pr-${PR_NUM}"
          RESP=$(curl -sS -w '\n%{http_code}' -X POST 'https://clc.is/api/links' \
            -H 'Content-Type: application/json' \
            -d "{\"domain\":\"clc.is\",\"target_url\":\"${PREVIEW_URL}\",\"slug\":\"${SLUG}\"}" 2>/dev/null) || true
          STATUS=$(echo "$RESP" | tail -1)
          if [[ "$STATUS" == "200" ]]; then
            SHORT=$(echo "$RESP" | grep -oE 'https://clc\.is/[^"]+' | head -1)
          elif [[ "$STATUS" == "409" ]]; then
            SHORT="https://clc.is/${SLUG}"
          fi
          echo "url=${SHORT:-$PREVIEW_URL}" >> $GITHUB_OUTPUT

      - name: Comment PR with preview link
        if: github.event.action != 'closed' && success() && steps.pr-preview.outputs.deployment-action == 'deploy' && steps.pr-preview.outputs.preview-url != ''
        uses: actions/github-script@v7
        env:
          DISPLAY_URL: ${{ steps.short-link.outputs.url || steps.pr-preview.outputs.preview-url }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const url = process.env.DISPLAY_URL;
            const issueNumber = process.env.ISSUE_NUMBER;
            if (!issueNumber) return;
            const body = `## Ссылка на приложение (preview)\n\n[copilot-1co-2.0](${url})\n\n*(Развёрнуто из этого PR; обновляется при новых коммитах.)*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNumber, 10),
              body
            });