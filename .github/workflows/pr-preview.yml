name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Safety: do not let any pr-preview content from PR
      # leak into source-dir and create recursion
      - name: Safety cleanup
        run: rm -rf pr-preview || true

      - name: Deploy PR preview
        id: pr-preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: true
          comment: "true"
          # Action prepends "https://" and "/" itself; pass host+path only to avoid "https://https://..."
          pages-base-url: ${{ format('{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
      - name: Show preview URL in log
        if: success() && steps.pr-preview.outputs.preview-url != ''
        run: |
          echo "Preview URL: ${{ steps.pr-preview.outputs.preview-url }}"
      # Гарантированно оставляем комментарий со ссылкой (действие rossjrw иногда не создаёт его)
      - name: Comment PR with preview link
        if: github.event.action != 'closed' && success() && steps.pr-preview.outputs.deployment-action == 'deploy' && steps.pr-preview.outputs.preview-url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.pr-preview.outputs.preview-url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const body = `## Ссылка на приложение (preview)\n\n**${url}**\n\n*(Развёрнуто из этого PR; обновляется при новых коммитах. Если 404 — в Settings → Pages выберите источник «Deploy from a branch», ветка \`gh-pages\`.)*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
